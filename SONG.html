<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEN Z ទំនើប</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f4f6f9;
        }
        .music-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            border-radius: 20px; /* ធ្វើឲ្យជ្រុងមូលស្អាតដូចក្នុងរូបរបស់អ្នក */
            overflow: hidden;
            background-color: #ffffff;
        }
        .music-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold text-primary mb-1">GEN Z ទំនើប</h1>
        <p class="text-muted small">បទ GEN Z</p>
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-4">
        
        <div class="col">
            <div class="card h-100 music-card shadow-sm p-4">
                <div class="card-body p-0 d-flex flex-column justify-content-between">
                    <div class="mb-4">
                        <h4 class="fw-bold text-dark mb-1">M-Fatt - ពេលនេះអូនក្បែរអ្នកណា?</h4>
                        <p class="text-muted small mb-0">M-Fatt</p>
                    </div>
                    
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/1p2kdE1ty3Y" 
                                title="YouTube video player" 
                                frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                allowfullscreen 
                                style="border-radius: 12px;">
                        </iframe>
                    </div>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card h-100 music-card shadow-sm p-4">
                <div class="card-body p-0 d-flex flex-column justify-content-between">
                    <div class="mb-4">
                        <h4 class="fw-bold text-dark mb-1">ផ្កាស្លា</h4>
                        <p class="text-muted small mb-0">
ផ្កាស្លា</p>
                    </div>
                    
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/1p2kdE1ty3Y" 
                                title="YouTube video player" 
                                frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                allowfullscreen 
                                style="border-radius: 12px;">
                        </iframe>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
