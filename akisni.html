<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electricity Cost Calculator</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
}

.box{
    width:400px;
    margin:60px auto;
    background:#1e293b;
    padding:25px;
    border-radius:10px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.result{
    background:#020617;
    padding:15px;
    margin-top:20px;
    border-radius:6px;
    display:none;
    line-height:1.8;
}

.rate{
    margin-top:20px;
    background:#020617;
    padding:15px;
    border-radius:6px;
    line-height:1.8;
}

</style>
</head>
<body>

<div class="box">

<h2>⚡ Electricity Calculator</h2>

<label>Old Reading (kWh)</label>
<input type="number" id="old">

<label>New Reading (kWh)</label>
<input type="number" id="new">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<div class="rate">
<b>📌 អត្រាតម្លៃ</b><br>

0 - 10 kWh = 380៛<br>
11 - 50 kWh = 480៛<br>
51 - 200 kWh = 610៛<br>
201+ kWh = 730៛

</div>

</div>

<script>

function calculate(){

    let oldReading = Number(document.getElementById("old").value);
    let newReading = Number(document.getElementById("new").value);

    if(
        document.getElementById("old").value == "" ||
        document.getElementById("new").value == ""
    ){
        alert("សូមបញ្ចូលព័ត៌មាន");
        return;
    }

    if(newReading < oldReading){
        alert("New Reading ត្រូវធំជាង Old Reading");
        return;
    }

    let used = newReading - oldReading;

    let price = 0;

    // កំណត់តម្លៃតាមកម្រិត
    if(used <= 10){

        price = 380;

    }else if(used <= 50){

        price = 480;

    }else if(used <= 200){

        price = 610;

    }else{

        price = 730;

    }

    // គណនាតម្លៃសរុប
    let total = used * price;

    document.getElementById("result").style.display = "block";

    document.getElementById("result").innerHTML =

    "⚡ ចំនួនប្រើប្រាស់: <b>" + used + " kWh</b><br>" +

    "💵 តម្លៃក្នុង 1 kWh: <b>" + price + " ៛</b><br>" +

    "💰 តម្លៃសរុប: <b>" +
    total.toLocaleString() +
    " ៛</b>";

}

</script>

</body>
</html>
